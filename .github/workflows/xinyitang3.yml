name: xinyitang3-EDT-Refined

on:
  workflow_dispatch:
  schedule:
    # 修改為每 8 小時執行一次 (00:00, 08:00, 16:00...)
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch and Process Data
        run: |
          mkdir -p xinyitang3
          # 設定北京時間
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET_FILE="xinyitang3/ipv4.txt"
          TMP_NEW="new_processed.tmp"
          TMP_OLD="old_processed.tmp"
          HAS_CHANGES=false

          # 1. 抓取新的原始數據 (使用 Raw 連結)
          RAW_DATA=$(curl -sSL --connect-timeout 10 "https://raw.githubusercontent.com/wanwushequ/cfyxip/main/xinyitang3/ipv4.txt")

          # 【安全檢查】檢查抓取是否成功且內容是否有效
          if [[ "$RAW_DATA" == *"404"* ]] || [[ ${#RAW_DATA} -lt 50 ]]; then
            echo "警告：數據源抓取異常或內容過短。跳過本次更新以保護現有文件。"
            exit 0
          fi

          # 2. 數據清洗邏輯 (方案 B：去頭去尾，提取核心)
          # 使用 grep 確保只提取包含 IP 格式的行，排除掉對方的自定義標題行
          echo "$RAW_DATA" | grep -E "[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}" | while read -r line; do
            # 提取 # 前面的內容 (IP:Port)
            ip_port=$(echo "$line" | cut -d'#' -f1)
            # 提取 # 後面的原始標籤內容
            tag=$(echo "$line" | cut -d'#' -f2-)
            
            if [[ -n "$ip_port" ]]; then
              # 重新組合成你的標準格式: 原內容 | IP:端口
              # 注意：這裡會保留對方原有的標籤描述，但加上你要求的後綴
              echo "$line" >> "$TMP_NEW"
            fi
          done

          # 3. 對比舊文件 (精確對比 IP 內容)
          if [ -s "$TMP_NEW" ]; then
            if [ -f "$TARGET_FILE" ]; then
              # 提取舊文件中的核心數據（去掉第1行和最後1行）
              sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
              if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
                should_write=true
              fi
            else
              should_write=true
            fi
          fi

          # 4. 寫入文件 (加上你自己的包裝)
          if [ "$should_write" = true ]; then
            # 寫入你的專屬開頭
            echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            
            # 插入抓取到的核心數據
            cat "$TMP_NEW" >> "$TARGET_FILE"
            
            # 寫入你的專屬結尾
            echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝Xinyitang3" >> "$TARGET_FILE"
            
            HAS_CHANGES=true
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add xinyitang3/*.txt
            git commit -m "xinyitang3 Refined Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          else
            echo "內容無實質變化，無需提交。"
          fi
          
