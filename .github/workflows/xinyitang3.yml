name: xinyitang3

on:
  workflow_dispatch:
  schedule:
    - cron: '*/35 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # 移除 FORCE 變量，改用 GitHub 默認的最速路徑
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 關閉不必要的 git 歷史抓取，加速運行
          fetch-depth: 1

      - name: Process
        run: |
          mkdir -p xinyitang3
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET="xinyitang3/ipv4.txt"
          
          # 1. 直接抓取
          RAW=$(curl -sSL --connect-timeout 5 "https://raw.githubusercontent.com/xinyitang3/vless/refs/heads/main/sub/Cf-ipv4.txt")

          # 2. 安全檢查 (防止 404 或空數據)
          if [[ "$RAW" == *"404"* ]] || [[ ${#RAW} -lt 10 ]]; then
            echo "抓取異常，跳過。"
            exit 0
          fi

          # 3. 處理數據
          NEW_DATA=$(echo "$RAW" | sed '/^$/d' | sed 's/.*/&:443#常用 | &/')
          
          # 4. 對比與寫入
          if [ -f "$TARGET" ]; then
            OLD_DATA=$(sed '1d;$d' "$TARGET")
            if [ "$OLD_DATA" == "$NEW_DATA" ]; then
              echo "數據未變動。"
              exit 0
            fi
          fi

          # 5. 生成最終文件
          echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET"
          echo "$NEW_DATA" >> "$TARGET"
          echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝Xinyitang3" >> "$TARGET"

          # 6. 提交變更
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "$TARGET"
          git commit -m "Update $BJ_TIME"
          git push origin main
