name: xinyitang3

on:
  workflow_dispatch:
  schedule:
    # 設定為每 35 分鐘執行一次
    - cron: '*/35 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Process Data
        run: |
          mkdir -p xinyitang3
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET_FILE="xinyitang3/ipv4.txt"
          TMP_NEW="new_nodes.tmp"
          TMP_OLD="old_nodes.tmp"
          HAS_CHANGES=false

          # 1. 抓取原始數據到變數進行檢查
          RAW_CONTENT=$(curl -s "https://raw.githubusercontent.com/xinyitang3/vless/refs/heads/main/sub/Cf-ipv4.txt")

          # 【安全檢查機制】
          # 如果抓取內容包含 "404" 或者長度小於 10 個字元（空內容或錯誤訊息），則終止流程
          if [[ "$RAW_CONTENT" == *"404"* ]] || [[ ${#RAW_CONTENT} -lt 10 ]]; then
            echo "警告：抓取失敗 (404 或數據為空)，為保護原始文件，本次更新已跳過。"
            echo "has_changes=false" >> $GITHUB_ENV
            exit 0
          fi

          # 2. 格式化數據並存入臨時文件 (轉化為「整行點擊複製」格式)
          echo "$RAW_CONTENT" | sed '/^$/d' | sed 's/.*/&:443#常用 | &/' > "$TMP_NEW"

          # 3. 對比邏輯 (排除首尾廣告/時間行)
          should_write=false
          if [ -f "$TARGET_FILE" ]; then
            # 提取舊文件中的核心內容（去頭去尾）
            sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
            # 對比純數據內容是否有變化
            if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
              should_write=true
            fi
          else
            should_write=true
          fi

          # 4. 寫入文件 (標準頭部供 index.html 提取時間)
          if [ "$should_write" = true ]; then
            echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            cat "$TMP_NEW" >> "$TARGET_FILE"
            echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝Xinyitang3" >> "$TARGET_FILE"
            HAS_CHANGES=true
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add xinyitang3/*.txt
            git commit -m "Xinyitang3 Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          else
            echo "數據內容無變動或抓取異常，跳過提交。"
          fi
