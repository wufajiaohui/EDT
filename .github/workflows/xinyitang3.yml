name: xinyitang3-EDT-Refined

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch and Process Data
        run: |
          mkdir -p xinyitang3
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET_FILE="xinyitang3/ipv4.txt"
          TMP_NEW="new_processed.tmp"
          TMP_OLD="old_processed.tmp"
          HAS_CHANGES=false

          # 1. 抓取原始數據
          RAW_DATA=$(curl -sSL --connect-timeout 10 "https://raw.githubusercontent.com/wanwushequ/cfyxip/main/xinyitang3/ipv4.txt")

          if [[ "$RAW_DATA" == *"404"* ]] || [[ ${#RAW_DATA} -lt 50 ]]; then
            echo "數據源抓取異常，跳過更新。"
            exit 0
          fi

          # 2. 數據清洗：精準匹配並提取 IP:PORT 和 兩位大寫字母地區碼
          echo "$RAW_DATA" | while read -r line; do
            # 檢查是否包含 IP 格式
            if [[ "$line" =~ [0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3} ]]; then
              # 提取 IP:PORT (取第一个 #号之前的所有非空格字符)
              ip_port=$(echo "$line" | cut -d'#' -f1 | xargs)
              
              # 利用正則表達式提取最後面的兩位大寫英文字母 (例如 JP, KR, TW, SG, HK, US)
              # grep -oE '[A-Z]{2}' 配合 tail -n 1 可以精準鎖定末尾的地區代碼
              region=$(echo "$line" | grep -oE '[A-Z]{2}' | tail -n 1)

              # 如果 ip_port 和 region 同時存在，才寫入臨時文件
              if [[ -n "$ip_port" && -n "$region" ]]; then
                # 嚴格輸出格式: 43.168.16.112:443#HK | 43.168.16.112:443
                echo "${ip_port}#${region} | ${ip_port}" >> "$TMP_NEW"
              fi
            fi
          done

          # 3. 內容對比
          if [ -s "$TMP_NEW" ]; then
            if [ -f "$TARGET_FILE" ]; then
              sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
              if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
                should_write=true
              fi
            else
              should_write=true
            fi
          fi

          # 4. 寫入文件
          if [ "$should_write" = true ]; then
            echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            cat "$TMP_NEW" >> "$TARGET_FILE"
            echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝Xinyitang3" >> "$TARGET_FILE"
            HAS_CHANGES=true
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add xinyitang3/*.txt
            git commit -m "xinyitang3 Refined Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          fi
