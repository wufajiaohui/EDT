name: domain-ip-update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch and Process Data
        run: |
          mkdir -p domain
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET_FILE="domain/ipv4.txt"
          
          TMP_PART1="part1.tmp"
          TMP_PART2="part2.tmp"
          TMP_FINAL="final_sorted.tmp"
          TMP_OLD="old.tmp"
          HAS_CHANGES=false
          
          rm -f "$TMP_PART1" "$TMP_PART2" "$TMP_FINAL"

          # 1. 抓取數據
          RAW_DATA=$(curl -sSL --connect-timeout 15 "https://raw.githubusercontent.com/svip-s/cloudflare_ip/main/best_ips.txt")
          RAW_DATA_FULL=$(curl -sSL --connect-timeout 15 "https://raw.githubusercontent.com/svip-s/cloudflare_ip/main/full_ips.txt")

          if [[ "$RAW_DATA" == *"404"* ]] || [[ ${#RAW_DATA} -lt 30 ]]; then
            echo "錯誤：主要數據源抓取失敗。"
            exit 0
          fi

          # 2. 處理第一區塊 (Best)：全量 + 排序
          echo "$RAW_DATA" | grep -E "([0-9]{1,3}\.){3}[0-9]{1,3}" | while read -r line; do
            clean_line=$(echo "$line" | tr -d '\r')
            [ -n "$clean_line" ] && echo "$clean_line" >> "$TMP_PART1"
          done
          [ -s "$TMP_PART1" ] && sort -t '#' -k 2 "$TMP_PART1" -o "$TMP_PART1"

          # 3. 處理第二區塊 (Full)：篩選 + 去重 + 排序
          if [[ "$RAW_DATA_FULL" != *"404"* ]] && [[ ${#RAW_DATA_FULL} -ge 30 ]]; then
            echo "$RAW_DATA_FULL" | grep -iE "#(NL|SG)" | grep -E ":(443|8443)" | while read -r line; do
              clean_line=$(echo "$line" | tr -d '\r')
              ip_port=$(echo "$clean_line" | sed 's/#.*//' | tr -d ' ')
              
              if [[ -n "$ip_port" ]]; then
                # 如果這個 IP 已經出現在第一區塊，就不要了
                if ! grep -q "$ip_port" "$TMP_PART1" 2>/dev/null; then
                  echo "$clean_line" >> "$TMP_PART2"
                fi
              fi
            done
            [ -s "$TMP_PART2" ] && sort -t '#' -k 2 "$TMP_PART2" -o "$TMP_PART2"
          fi

          # 4. 按權重合併：最優在前，補充在後
          cat "$TMP_PART1" > "$TMP_FINAL"
          [ -f "$TMP_PART2" ] && cat "$TMP_PART2" >> "$TMP_FINAL"

          # 5. 寫入與提交
          should_write=false
          if [ -s "$TMP_FINAL" ]; then
            if [ -f "$TARGET_FILE" ]; then
              sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
              if ! diff -q "$TMP_OLD" "$TMP_FINAL" > /dev/null; then
                should_write=true
              fi
            else
              should_write=true
            fi
          fi

          if [ "$should_write" = true ]; then
            echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            cat "$TMP_FINAL" >> "$TARGET_FILE"
            echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝svip-s" >> "$TARGET_FILE"
            HAS_CHANGES=true
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add domain/ipv4.txt
            git commit -m "Domain IP Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          fi
