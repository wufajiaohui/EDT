name: domain-ip-update

on:
  workflow_dispatch:
  schedule:
    # 每 4 小時執行一次 (00:00, 04:00, 08:00...)
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Fetch and Process Data
        run: |
          # 1. 初始化環境
          mkdir -p domain
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          TARGET_FILE="domain/ipv4.txt"
          TMP_NEW="new_processed.tmp"
          TMP_OLD="old_processed.tmp"
          HAS_CHANGES=false
          
          # 清理可能存在的舊臨時文件
          rm -f "$TMP_NEW" "$TMP_OLD"

          # 2. 抓取原始數據
          echo "正在從遠端抓取數據..."
          RAW_DATA=$(curl -sSL --connect-timeout 15 "https://raw.githubusercontent.com/svip-s/cloudflare_ip/main/best_ips.txt")
          RAW_DATA_FULL=$(curl -sSL --connect-timeout 15 "https://raw.githubusercontent.com/svip-s/cloudflare_ip/main/full_ips.txt")

          # 【安全檢查】檢查數據源是否有效
          if [[ "$RAW_DATA" == *"404"* ]] || [[ ${#RAW_DATA} -lt 30 ]]; then
            echo "錯誤：主要數據源 (best_ips) 抓取異常，終止任務。"
            exit 0
          fi

          # 3. 處理 best_ips.txt (基礎數據)
          echo "正在處理基礎節點 (best_ips)..."
          echo "$RAW_DATA" | grep -E "([0-9]{1,3}\.){3}[0-9]{1,3}" | while read -r line; do
            clean_line=$(echo "$line" | tr -d '\r')
            # 提取 IP:Port (支持處理含有 # 的行)
            ip_port=$(echo "$clean_line" | sed 's/#.*//' | tr -d ' ')
            
            if [[ -n "$ip_port" ]]; then
              echo "$clean_line | $ip_port" >> "$TMP_NEW"
            fi
          done

          # 4. 處理 full_ips.txt (追加特定歐洲國家)
          if [[ "$RAW_DATA_FULL" != *"404"* ]] && [[ ${#RAW_DATA_FULL} -ge 30 ]]; then
            echo "正在追加歐洲特定節點 (NL, FR, DE, GB)..."
            
            # 使用 -iE 同時支持大小寫與多個國家代碼
            # 這裡針對你提供的格式 #NL, #FR, #DE, #GB 進行精確過濾
            echo "$RAW_DATA_FULL" | grep -iE "#(NL|FR|DE|GB|UK)" | grep -E ":(443|8443)" | while read -r line; do
              
              clean_line=$(echo "$line" | tr -d '\r')
              # 提取純淨的 IP:Port 用於查重
              ip_port=$(echo "$clean_line" | sed 's/#.*//' | tr -d ' ')
              
              if [[ -n "$ip_port" ]]; then
                # 去重邏輯：如果該 IP:Port 尚未被記錄在 TMP_NEW 中，則追加
                if ! grep -q "$ip_port" "$TMP_NEW" 2>/dev/null; then
                  echo "$clean_line | $ip_port" >> "$TMP_NEW"
                fi
              fi
            done
          else
            echo "警告：full_ips 數據源異常，跳過追加。"
          fi

          # 5. 內容對比與寫入
          if [ -s "$TMP_NEW" ]; then
            if [ -f "$TARGET_FILE" ]; then
              # 排除舊文件首尾的動態註釋行進行對比
              sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
              if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
                should_write=true
              else
                should_write=false
              fi
            else
              should_write=true
            fi
          fi

          # 6. 生成最終文件
          if [ "$should_write" = true ]; then
            echo "檢測到數據變動，正在更新 $TARGET_FILE"
            echo "saas.sin.fan:443#▼ 優選IPv4 | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            cat "$TMP_NEW" >> "$TARGET_FILE"
            echo "bestcf.030101.xyz:443#▲ 優選IPv4 | Cloudflare EDT | 感謝svip-s" >> "$TARGET_FILE"
            HAS_CHANGES=true
          else
            echo "數據內容一致，無需更新文件。"
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add domain/ipv4.txt
            git commit -m "Domain IP Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          else
            echo "無需執行提交操作。"
          fi
