name: tiancheng

on:
  workflow_dispatch:
  schedule:
    # 每天北京時間 08:05, 14:05, 20:05 執行 (UTC 00:05, 06:05, 12:05)
    - cron: '5 0,6,12 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Process and Write Strictly Ordered
        run: |
          mkdir -p tiancheng
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M:%S")
          TARGET_FILE="tiancheng/all.txt"
          HAS_CHANGES=false
          
          # 清理潛在的舊暫存檔
          rm -f tmp_*.txt

          # 1. 抓取數據
          RAW_BASE64=$(curl -sSL --connect-timeout 10 "https://cm.soso.edu.kg/sub?host=123&uuid=456")

          if [[ "$RAW_BASE64" == *"404"* ]] || [[ ${#RAW_BASE64} -lt 20 ]]; then
            echo "警告：數據源抓取異常，跳過本次處理。"
            exit 0
          fi

          # 2. 解碼並解析格式化
          RAW_DATA=$(echo "$RAW_BASE64" | tr -d ' \n\r' | base64 -d 2>/dev/null)
          
          if [ -n "$RAW_DATA" ]; then
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              
              # 提取 IP:Port
              hp=$(echo "$line" | grep -oP '(?<=@)[^?#]+' | head -n1)
              
              # 【關鍵更新 1】過濾：只允許 443 端口
              if [[ -n "$hp" && "$hp" == *:443 ]]; then
                name_part=$(echo "$line" | cut -d'#' -f2)
                
                # 【關鍵更新 2】地區識別，並寫入對應的獨立暫存檔
                if [[ "$name_part" =~ "JP" || "$name_part" =~ "日本" ]]; then 
                  echo "${hp}#日本 JP | ${hp}" >> tmp_JP.txt
                elif [[ "$name_part" =~ "SG" || "$name_part" =~ "新加坡" ]]; then 
                  echo "${hp}#新加坡 SG | ${hp}" >> tmp_SG.txt
                elif [[ "$name_part" =~ "HK" || "$name_part" =~ "香港" ]]; then 
                  echo "${hp}#香港 HK | ${hp}" >> tmp_HK.txt
                elif [[ "$name_part" =~ "US" || "$name_part" =~ "美國" ]]; then 
                  echo "${hp}#美國 US | ${hp}" >> tmp_US.txt
                elif [[ "$name_part" =~ "TW" || "$name_part" =~ "台灣" ]]; then 
                  echo "${hp}#台灣 TW | ${hp}" >> tmp_TW.txt
                else 
                  echo "${hp}#其它 OT | ${hp}" >> tmp_OT.txt
                fi
              fi
            done <<< "$RAW_DATA"
          fi

          # 3. 按照嚴格順序合併寫入
          # 檢查是否有任何暫存檔產生（表示有成功抓到 443 節點）
          if ls tmp_*.txt 1> /dev/null 2>&1; then
            echo "saas.sin.fan:443#▼ 優選IP | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            
            # 【關鍵更新 3】嚴格按照順序：JP, SG, HK, US, TW, OT 讀取並去重寫入
            for reg in JP SG HK US TW OT; do
              if [ -s "tmp_${reg}.txt" ]; then
                sort -u "tmp_${reg}.txt" >> "$TARGET_FILE"
              fi
            done
            
            echo "bestcf.030101.xyz:443#▲ 優選IP | Cloudflare EDT | 感謝天誠" >> "$TARGET_FILE"
            HAS_CHANGES=true
          else
            echo "警告：沒有獲取到有效的 443 端口節點，跳過寫入。"
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add tiancheng/*.txt
            
            git commit -m "TianCheng Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')" || true
            git pull --rebase origin main
            git push origin main
          else
            echo "抓取失敗或無有效節點數據，跳過提交。"
          fi
          
