name: tiancheng

on:
  workflow_dispatch:
  schedule:
    # 每天北京時間 08:05, 14:05, 20:05 執行 (UTC 00:05, 06:05, 12:05)
    - cron: '5 0,6,12 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Process and Write Unconditionally
        run: |
          mkdir -p tiancheng
          # 加上秒數，確保每次生成的標題行都不一樣，觸發 Git 變更
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M:%S")
          TARGET_FILE="tiancheng/all.txt"
          TMP_NEW="new_nodes.tmp"
          HAS_CHANGES=false

          # 1. 抓取數據 (保留安全檢查，防範源端 404 覆蓋數據)
          RAW_BASE64=$(curl -sSL --connect-timeout 10 "https://cm.soso.edu.kg/sub?host=123&uuid=456")

          if [[ "$RAW_BASE64" == *"404"* ]] || [[ ${#RAW_BASE64} -lt 20 ]]; then
            echo "警告：數據源抓取異常，跳過本次處理以保護原始數據。"
            exit 0
          fi

          # 2. 解碼並解析格式化
          RAW_DATA=$(echo "$RAW_BASE64" | tr -d ' \n\r' | base64 -d 2>/dev/null)
          
          if [ -n "$RAW_DATA" ]; then
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              
              # 改進的提取邏輯：匹配 @ 之後，直到 ? 或 # 結束
              hp=$(echo "$line" | grep -oP '(?<=@)[^?#]+' | head -n1)
              
              if [[ -n "$hp" ]]; then
                name_part=$(echo "$line" | cut -d'#' -f2)
                
                # 地區識別邏輯
                if [[ "$name_part" =~ "HK" || "$name_part" =~ "香港" ]]; then loc="香港 HK"
                elif [[ "$name_part" =~ "SG" || "$name_part" =~ "新加坡" ]]; then loc="新加坡 SG"
                elif [[ "$name_part" =~ "JP" || "$name_part" =~ "日本" ]]; then loc="日本 JP"
                elif [[ "$name_part" =~ "US" || "$name_part" =~ "美國" ]]; then loc="美國 US"
                elif [[ "$name_part" =~ "TW" || "$name_part" =~ "台灣" ]]; then loc="台灣 TW"
                else loc="其它 OT"; fi
                
                echo "${hp}#${loc} | ${hp}" >> "$TMP_NEW"
              fi
            done <<< "$RAW_DATA"
          fi

          # 3. 強制寫入文件 (只要有抓到有效節點，就無腦覆寫)
          if [ -s "$TMP_NEW" ]; then
            echo "saas.sin.fan:443#▼ 優選IP | $BJ_TIME | Cloudflare EDT" > "$TARGET_FILE"
            sort -u "$TMP_NEW" >> "$TARGET_FILE"
            echo "bestcf.030101.xyz:443#▲ 優選IP | Cloudflare EDT | 感謝天誠" >> "$TARGET_FILE"
            HAS_CHANGES=true
          else
            echo "警告：解析後沒有獲取到有效節點，跳過寫入。"
          fi

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add tiancheng/*.txt
            
            # 加上 || true 防止因極端情況 (內容完全無變動) 導致 Action 執行失敗
            git commit -m "TianCheng Update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')" || true
            
            git pull --rebase origin main
            git push origin main
          else
            echo "抓取失敗或無有效節點數據，跳過提交。"
          fi
          
